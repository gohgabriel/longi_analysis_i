<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Longitudinal Data Analysis</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <script src="nav.js" data-page="ch00_index"></script>

  <div class="page-body">
    <div class="card">

      <h1>Longitudinal Data Analysis</h1>
      <p class="subtitle">Course notes — Gabriel Goh</p>

      <div class="prose">
        <p>
          These notes cover the analysis of repeated-measures and panel data,
          from classical OLS/GLS approaches through to multilevel and Bayesian models.
          Each chapter combines theory with interactive visualizations and worked case studies in R.
        </p>
      </div>

      <!-- Chapter list rendered from toc.json -->
      <ul id="chapter-list" style="list-style:none; padding:0; margin:0;"></ul>

    </div>
  </div>

  <script>
    fetch('toc.json')
      .then(r => r.json())
      .then(toc => {
        const container = document.getElementById('chapter-list');

        toc.sections.forEach(section => {
          // Section header
          const secEl = document.createElement('li');
          secEl.style.cssText = 'padding: 1.25rem 0 0.35rem; list-style:none;';
          secEl.innerHTML = `<span style="font-family:sans-serif; font-size:0.68rem; text-transform:uppercase; letter-spacing:0.09em; color:var(--text-muted); font-weight:600;">${section.title}</span>`;
          container.appendChild(secEl);

          section.chapters.forEach(ch => {
            const isDraft = ch.status === 'draft';
            const li = document.createElement('li');
            li.style.cssText = 'border-top: 1px solid var(--border); list-style:none;';

            const inner = document.createElement(isDraft ? 'div' : 'a');
            if (!isDraft) inner.href = ch.file;
            inner.style.cssText = 'text-decoration:none; display:flex; flex-direction:column; gap:3px; padding: 0.75rem 0;'
              + (isDraft ? 'opacity:0.45; cursor:default;' : '');

            const title = document.createElement('span');
            title.style.cssText = 'font-family:Georgia,serif; font-size:0.92rem; color:var(--text);';
            title.textContent = ch.title + (isDraft ? ' — coming soon' : '');

            const desc = document.createElement('span');
            desc.style.cssText = 'font-family:sans-serif; font-size:0.78rem; color:var(--text-muted);';
            desc.textContent = ch.description || '';

            inner.appendChild(title);
            if (ch.description) inner.appendChild(desc);
            li.appendChild(inner);
            container.appendChild(li);
          });
        });
      });
  </script>

</body>
</html>
